<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrokSpace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      max-width: 700px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 1.2rem;
      color: #cbd5e1;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 24px 16px;
      transition: transform 0.2s, background 0.2s;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.14);
    }

    .feature-card .icon { font-size: 2rem; margin-bottom: 10px; }
    .feature-card h3 { font-size: 1rem; margin-bottom: 6px; color: #e2e8f0; }
    .feature-card p  { font-size: 0.85rem; color: #94a3b8; }

    .cta {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .cta:hover { opacity: 0.85; }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚀</div>
    <h1>GrokSpace</h1>
    <p class="tagline">
      一个由 AI 驱动的智能工作空间，<br />
      让代码协作与自动化触手可及。
    </p>

    <div class="features">
      <div class="feature-card">
        <div class="icon">🤖</div>
        <h3>AI 代理</h3>
        <p>委托任务，全程自动执行</p>
      </div>
      <div class="feature-card">
        <div class="icon">💻</div>
        <h3>代码开发</h3>
        <p>读写、重构、修复一步到位</p>
      </div>
      <div class="feature-card">
        <div class="icon">🔍</div>
        <h3>智能搜索</h3>
        <p>深度分析代码库结构</p>
      </div>
      <div class="feature-card">
        <div class="icon">🔒</div>
        <h3>安全扫描</h3>
        <p>内置 CodeQL 安全审查</p>
      </div>
    </div>

    <a class="cta" href="https://github.com/1058797782/GrokSpace">在 GitHub 上查看</a>

    <footer>© 2026 GrokSpace · Powered by AI</footer>
  </div>
</body>
</html>
